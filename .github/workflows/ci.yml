name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Lay the host and its replace targets (../agentcarto-core, ../plugin-claude) side by side.
      # The repos are public, so the default GITHUB_TOKEN is enough to check out the siblings.
      - uses: actions/checkout@v4
        with:
          path: agentcarto
      - uses: actions/checkout@v4
        with:
          repository: agentcarto/core
          path: agentcarto-core
      - uses: actions/checkout@v4
        with:
          repository: agentcarto/plugin-claude
          path: plugin-claude
      - uses: actions/setup-go@v5
        with:
          go-version-file: agentcarto/go.mod
      - name: Build & test
        working-directory: agentcarto
        run: |
          go build ./...
          go test ./...
      - name: Race test
        if: runner.os == 'Linux'
        working-directory: agentcarto
        run: go test -race ./...
